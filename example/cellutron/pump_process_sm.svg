<svg width="400" height="700" viewBox="0 0 400 700" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="700" fill="#ffffff" />
  
  <!-- Styles -->
  <style>
    .state { fill: #f8f9fa; stroke: #333; stroke-width: 2; }
    .state-text { font-family: sans-serif; font-size: 11px; font-weight: bold; text-anchor: middle; }
    .transition { fill: none; stroke: #666; stroke-width: 1.5; marker-end: url(#arrowhead); }
    .transition-text { font-family: sans-serif; font-size: 9px; fill: #007bff; }
  </style>

  <!-- Markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
    </marker>
  </defs>

  <!-- States (Vertical Line X=200) -->
  <rect x="150" y="40" width="100" height="40" rx="5" class="state" />
  <text x="200" y="65" class="state-text">IDLE</text>

  <rect x="150" y="140" width="100" height="40" rx="5" class="state" />
  <text x="200" y="165" class="state-text">VALVE_OPEN</text>

  <rect x="150" y="240" width="100" height="40" rx="5" class="state" />
  <text x="200" y="265" class="state-text">PUMP_ON</text>

  <rect x="150" y="340" width="100" height="40" rx="5" class="state" />
  <text x="200" y="365" class="state-text">WAITING</text>

  <rect x="150" y="440" width="100" height="40" rx="5" class="state" />
  <text x="200" y="465" class="state-text">PUMP_OFF</text>

  <rect x="150" y="540" width="100" height="40" rx="5" class="state" />
  <text x="200" y="565" class="state-text">VALVE_CLOSE</text>

  <!-- Transitions -->
  <path d="M 200,80 L 200,140" class="transition" />
  <text x="205" y="115" class="transition-text">Start</text>

  <path d="M 200,180 L 200,240" class="transition" />
  <text x="205" y="215" class="transition-text">ValveOpened</text>

  <path d="M 200,280 L 200,340" class="transition" />
  <text x="205" y="315" class="transition-text">PumpStarted</text>

  <path d="M 200,380 L 200,440" class="transition" />
  <text x="205" y="415" class="transition-text">TimerDone</text>

  <path d="M 200,480 L 200,540" class="transition" />
  <text x="205" y="515" class="transition-text">PumpStopped</text>

  <!-- Loop back to IDLE -->
  <path d="M 200,580 L 200,620 L 70,620 L 70,60 L 150,60" class="transition" />
  <text x="80" y="610" class="transition-text">ValveClosed → InternalEvent(ST_IDLE)</text>

</svg>