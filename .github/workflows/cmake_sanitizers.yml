name: Sanitizers

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  asan:
    name: AddressSanitizer
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake (ASan)
      run: cmake -S . -B build -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_BUILD_TYPE=RelWithDebInfo -DSANITIZE=address

    - name: Build
      run: cmake --build build --target delegate_app

    - name: Run tests
      run: ./build/delegate_app/delegate_app
      env:
        ASAN_OPTIONS: halt_on_error=1:detect_leaks=1

  tsan:
    name: ThreadSanitizer
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake (TSan)
      run: cmake -S . -B build -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_BUILD_TYPE=RelWithDebInfo -DSANITIZE=thread

    - name: Build
      run: cmake --build build --target delegate_app

    - name: Run tests
      run: ./build/delegate_app/delegate_app
      env:
        TSAN_OPTIONS: halt_on_error=1

  ubsan:
    name: UndefinedBehaviorSanitizer
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake (UBSan)
      run: cmake -S . -B build -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_BUILD_TYPE=RelWithDebInfo -DSANITIZE=undefined

    - name: Build
      run: cmake --build build --target delegate_app

    - name: Run tests
      run: ./build/delegate_app/delegate_app
      env:
        UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
