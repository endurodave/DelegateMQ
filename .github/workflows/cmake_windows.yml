name: Windows

on:
  push:
    branches:
      - master  # Trigger on push 
  pull_request:
    branches:
      - master  # Trigger on pull 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2022  # Explicitly use Windows 2022 to match Visual Studio 2022

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure CMake
      # Use default generator for windows-2022 image (Visual Studio 2022)
      run: cmake -S . -B build

    - name: Build
      run: cmake --build build --config Release

    - name: Run delegate_app
      run: .\build\delegate_app\Release\delegate_app.exe
